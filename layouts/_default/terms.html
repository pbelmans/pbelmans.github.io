{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  <div class="post-content">
    <ul>
      {{ range .Data.Terms.Alphabetical }}
        <li><a href="{{ .Page.RelPermalink }}">{{ .Page.Title | htmlUnescape }}</a> ({{ .Count }})</li>
      {{ end }}
    </ul>
  </div>
</article>
{{ end }}
