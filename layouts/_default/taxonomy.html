{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  <div class="post-content">
    <ul class="posts-list">
      {{ range .Pages.ByDate.Reverse }}
        <li><span class="date">{{ .Date.Format "Jan 02, 2006" }}</span> <a href="{{ .RelPermalink }}">{{ .Title | htmlUnescape }}</a></li>
      {{ end }}
    </ul>
  </div>
</article>
{{ end }}
